<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        :root { --main-green: #39FF14; --bg-dark: #0a0a0a; --card-bg: #161616; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 90px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 0.65em; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main-green); font-weight: bold; }

        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--main-green); position: relative; }
        
        /* Адмін-кнопки (приховані за замовчуванням) */
        .admin-only { display: none; }
        .btn-del { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 3px 8px; border-radius: 5px; font-size: 0.6em; cursor: pointer; }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-item { background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .market-img { width: 100%; height: 120px; object-fit: cover; }

        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #333; }
        .btn-main { background: var(--main-green); color: black; font-weight: bold; cursor: pointer; }
        #msg-box { height: 350px; overflow-y: auto; }
        .msg-item { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div style="padding: 5px; text-align: right;">
