<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Community</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #39FF14; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Форма створення */
        .registration-form { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        
        /* Картки гравців */
        .players-feed { display: grid; gap: 20px; }
        .player-card { background: linear-gradient(145deg, #2a2a2a, #1a1a1a); border-left: 5px solid #39FF14; padding: 15px; border-radius: 12px; position: relative; }
        .player-name { color: #39FF14; font-size: 1.3em; font-weight: bold; text-transform: uppercase; }
        .player-info { font-size: 0.9em; color: #aaa; margin: 5px 0; }
        
        .btn { background: #39FF14; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .badge { position: absolute; top: 15px; right: 15px; background: #333; padding: 5px 10px; border-radius: 20px; font-size: 0.7em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>G&M FOOTBALL PRO</h1>
        <p>Глобальна спільнота юних талантів</p>
    </div>

    <div class="registration-form">
        <h3>➕ СТВОРИТИ КАРТКУ ГРАВЦЯ</h3>
        <input type="text" id="parentName" placeholder="Ваше ім'я (батько/мати)">
        <input type="text" id="childName" placeholder="Ім'я дитини">
        <input type="number" id="childAge" placeholder="Вік дитини">
        <input type="number" id="childHeight" placeholder="Ріст (см)">
        <button class="btn" onclick="addPlayer()">ОПУБЛІКУВАТИ КАРТКУ</button>
    </div>

    <h2 style="text-align: left; border-left: 4px solid #39FF14; padding-left: 10px;">СТРІЧКА ГРАВЦІВ</h2>
    
    <div id="playersFeed" class="players-feed">
        <div class="player-card">
            <span class="badge">ЗАСНОВНИК</span>
            <div class="player-name">МАРК</div>
            <div class="player-info">Вік: 11 років | Ріст: 145 см</div>
            <div class="player-info">Батько: Юрій</div>
        </div>
        <div class="player-card">
            <span class="badge">ЗАСНОВНИК</span>
            <div class="player-name">ГЛІБ</div>
            <div class="player-info">Вік: 2 роки | Ріст: 92 см</div>
            <div class="player-info">Батько: Юрій</div>
        </div>
    </div>

    <script>
        function addPlayer() {
            const pName = document.getElementById('parentName').value;
            const cName = document.getElementById('childName').value;
            const cAge = document.getElementById('childAge').value;
            const cHeight = document.getElementById('childHeight').value;

            if(!pName || !cName) {
                alert("Будь ласка, заповніть хоча б імена!");
                return;
            }

            const feed = document.getElementById('playersFeed');
            const newCard = document.createElement('div');
            newCard.className = 'player-card';
            newCard.innerHTML = `
                <span class="badge">НОВИЙ ГРАВЕЦЬ</span>
                <div class="player-name">${cName.toUpperCase()}</div>
                <div class="player-info">Вік: ${cAge} років | Ріст: ${cHeight} см</div>
                <div class="player-info">Батько/Мати: ${pName}</div>
            `;
            
            feed.prepend(newCard); // Додаємо на початок списку

            // Очищення полів
            document.getElementById('parentName').value = '';
            document.getElementById('childName').value = '';
            document.getElementById('childAge').value = '';
            document.getElementById('childHeight').value = '';
            
            alert("Картку створено! Тепер ви у спільноті.");
        }
    </script>
</body>
</html>
