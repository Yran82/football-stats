<!DOCTYPE html>

    <style>
        :root { --green: #39FF14; --blue: #4285F4; --dark: #0a0a0a; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Навігація */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; height: 70px; border-top: 1px solid #333; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.8); }
        .nav-item { color: #888; font-size: 0.65em; text-align: center; cursor: pointer; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .nav-item.active { color: var(--green); font-weight: bold; }

        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Картки */
        .card { background: #161616; border-radius: 18px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--green); position: relative; }
        .admin-only { display: none !important; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 10px; border-radius: 6px; font-size: 0.6em; cursor: pointer; }

        canvas { max-width: 250px; margin: 0 auto; display: block; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #333; }
        .btn-main { background: var(--green); color: black; font-weight: bold; cursor: pointer; }

        /* Чат */
        #msg-box { height: 350px; overflow-y: auto; background: #050505; border-radius: 12px; padding: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .msg-item { background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 10px; position: relative; border-bottom: 1px solid #333; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

        <div class="card" style="border-left-color: var(--blue);">
            <h2>МАРК (2 роки)</h2>

        </div>

    <div id="tab-rating" class="tab-content">

        <div id="leaderboard"></div>
    </div>

    <div id="tab-market" class="tab-content">
        <h1 style="color:var(--green)">MARKETPLACE</h1>
        <div class="card" style="border-style: dashed;">
            <input type="text" id="marketName" placeholder="Назва товару">
            <input type="file" id="marketFile" accept="image/*">
            <button class="btn-main" onclick="uploadToMarket()">ВИСТАВИТИ ТОВАР</button>
        </div>
        <div id="market-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="tab-events" class="tab-content">
        <h1 style="color:var(--green)">MATCH DAY</h1>
        <div class="card">

        </div>
    </div>

    <div id="tab-chat" class="tab-content">

        <input type="text" id="chatInput" placeholder="Повідомлення...">

    </div>
