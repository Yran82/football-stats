<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/football.png">

    <style>
        :root { --main-green: #39FF14; --bg-dark: #0a0a0a; --card-bg: #161616; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 100px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.8); }
        .nav-item { color: #888; font-size: 0.65em; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--main-green); transform: scale(1.1); font-weight: bold; }

        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--main-green); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .admin-only { display: none; }
        .btn-del { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 10px; border-radius: 6px; font-size: 0.6em; cursor: pointer; }

        /* Графік */
        .chart-container { width: 100%; max-width: 250px; margin: 15px auto; background: rgba(255,255,255,0.03); border-radius: 50%; padding: 10px; }

        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 0.9em; }
        input { background: #222; color: white; border: 1px solid #333; }
        .btn-main { background: var(--main-green); color: black; font-weight: bold; cursor: pointer; }

        /* Чат */
        #msg-box { height: 400px; overflow-y: auto; padding-right: 5px; }
        .msg-item { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #222; position: relative; }
        .msg-time { font-size: 0.6em; color: #555; position: absolute; bottom: 8px; right: 12px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 8px; }
    </style>
</head>
<body>

    <div style="padding: 10px; text-align: right;">
        <button onclick="adminLogin()" style="width: auto; padding: 5px 12px; font-size: 0.7em; background: #222; color: #444; border-radius: 20px;">🔐 Admin Access</button>
    </div>

    <div id="profile" class="tab-content active">
        <h1 style="color:var(--main-green); text-align: center;">MY PRO CAREER</h1>
        
        <div class="card">
            <h2>ГЛІБ (11 років)</h2>
            <div class="chart-container"><canvas id="chartGlib"></canvas></div>
            <div style="text-align:center; font-size: 0.8em; color: #aaa;">Ріст: 135 см | Вага: 33 кг</div>
        </div>

        <div class="card" style="border-left-color: #4285F4;">
            <h2>МАРК (2 роки)</h2>
            <div class="chart-container"><canvas id="chartMark"></canvas></div>
            <div style="text-align:center; font-size: 0.8em; color: #aaa;">Ріст: 92 см | Вага: 14.5 кг</div>
        </div>
    </div>

    <div id="community" class="tab-content">
        <h1 style="color:var(--main-green)">LEADERBOARD</h1>
        <div id="leaderboard"></div>
    </div>

    <div id="market" class="tab-content">
        <h1 style="color:var(--main-green)">MARKETPLACE</h1>
        <div class="card" style="border: 1px dashed var(--main-green);">
            <input type="text" id="itemName" placeholder="Назва товару">
            <input type="file" id="itemFile" accept="image/*">
            <button class="btn-main" onclick="uploadMarketItem()">ВИСТАВИТИ ТОВАР</button>
        </div>
        <div id="market-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="calendar" class="tab-content">
        <h1 style="color:var(--main-green)">MATCH DAY</h1>
        <div class="card">
            <strong style="color:var(--main-green)">15 БЕРЕЗНЯ</strong><br>
            🏆 Фінал турніру (Гліб)<br>
            📍 Стадіон "Локомотив", 10:00
        </div>
    </div>

    <div id="chat" class="tab-content">
        <h1 style="color:var(--main-green)">TEAM CHAT</h1>
        <div id="msg-box"></div>
        <div style="position: sticky; bottom: 0; background: var(--bg-dark); padding-top: 10px;">
            <input type="text" id="chatInput" placeholder="Повідомлення...">
            <input type="file" id="chatFile" accept="image/*">
            <button class="btn-main" id="sendBtn" onclick="uploadAndSend()">ВІДПРАВИТИ</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('profile', this)">👤<br>Профіль</div>
        <div class="nav-item" onclick="switchTab('community', this)">🏆<br>Рейтинг</div>
        <div class="nav-item" onclick="switchTab('market', this)">🏪<br>Крамниця</div>
        <div class="nav-item" onclick="switchTab('calendar', this)">📅<br>Події</div>
        <div class="nav-item" onclick="switchTab('chat', this)">💬<br>Чат</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyADqPVJXhMwre4O3GV6VL84b8y1VA7XApg",
            authDomain: "gm-football.firebaseapp.com",
            projectId: "gm-football",
            storageBucket: "gm-football.firebasestorage.app",
            messagingSenderId: "37289387027",
            appId: "1:37289387027:web:27083c91ee7f62ee81cbe6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let isAdmin = false;

        // ВИПРАВЛЕНА ФУНКЦІЯ ВХОДУ
        function adminLogin() {
            const p = prompt("Password:");
            if(p === "0608") {
                isAdmin = true; 
                alert("Admin Mode Active!");
                // Знаходимо всі приховані кнопки і показуємо їх прямо зараз
                const adminButtons = document.querySelectorAll('.admin-only');
                adminButtons.forEach(btn => {
                    btn.style.setProperty('display', 'block', 'important');
                });
            } else {
                alert("Wrong password!");
            }
        }

        // РАДАР-ГРАФІКИ
        function createRadar(id, color, data) {
            new Chart(document.getElementById(id), {
                type: 'radar',
                data: {
                    labels: ['PAC', 'SHO', 'PAS', 'DRI', 'DEF', 'PHY'],
                    datasets: [{
                        data: data,
                        backgroundColor: color + '33',
                        borderColor: color,
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: { 
                    scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#333' }, angleLines: { color: '#333' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
        createRadar('chartGlib', '#39FF14', [85, 80, 75, 90, 60, 70]);
        createRadar('chartMark', '#4285F4', [40, 30, 50, 60, 20, 40]);

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function uploadAndSend() {
            const txt = document.getElementById('chatInput').value;
            const file = document.getElementById('chatFile').files[0];
            const btn = document.getElementById('sendBtn');
            if(!txt && !file) return;
            btn.disabled = true;
            let url = "";
            if(file) {
                const ref = storage.ref(`chat/${Date.now()}`);
                await ref.put(file);
                url = await ref.getDownloadURL();
            }
            await db.collection("chat").add({ text: txt, img: url, time: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('chatInput').value = ""; document.getElementById('chatFile').value = "";
            btn.disabled = false;
        }

        // ОНОВЛЕНИЙ ЧАТ (з перевіркою isAdmin)
        db.collection("chat").orderBy("time", "asc").onSnapshot(snap => {
            const box = document.getElementById('msg-box');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                const displayStyle = isAdmin ? 'block' : 'none';
                box.innerHTML += `<div class="msg-item">
                    <button class="btn-del admin-only" style="display:${displayStyle}; float:right" onclick="deleteItem('chat','${doc.id}')">×</button>
                    <div style="font-size:0.9em;">${m.text}</div>
                    ${m.img ? `<img src="${m.img}" class="msg-img">` : ""}
                    <div class="msg-time">${time}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        async function uploadMarketItem() {
            const n = document.getElementById('itemName').value;
            const f = document.getElementById('itemFile').files[0];
            if(!n || !f) return alert("Заповніть назву та фото!");
            const ref = storage.ref(`market/${Date.now()}`);
            await ref.put(f);
            const url = await ref.getDownloadURL();
            await db.collection("market").add({ name: n, img: url, time: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Товар додано!");
        }

        // ОНОВЛЕНА КРАМНИЦЯ
        db.collection("market").orderBy("time", "desc").onSnapshot(snap => {
            const l = document.getElementById('market-list'); l.innerHTML = "";
            snap.forEach(doc => {
                const i = doc.data();
                const displayStyle = isAdmin ? 'block' : 'none';
                l.innerHTML += `<div style="background:#1a1a1a; border-radius:10px; overflow:hidden; position:relative;">
                    <img src="${i.img}" style="width:100%; height:100px; object-fit:cover;">
                    <div style="padding:5px; font-size:0.7em;">${i.name}</div>
                    <button class="btn-del admin-only" style="display:${displayStyle}; margin:5px;" onclick="deleteItem('market','${doc.id}')">Видалити</button>
                </div>`;
            });
        });

        async function deleteItem(c, i) { 
            if(confirm("Видалити цей запис назавжди?")) {
                await db.collection(c).doc(i).delete(); 
            }
        }
