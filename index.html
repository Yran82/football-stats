<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Elite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #39FF14; margin-bottom: 20px; padding-bottom: 10px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 20px; position: relative; }
        h2 { color: #39FF14; margin: 0 0 10px 0; text-transform: uppercase; }
        
        /* Спортивні метрики */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .stat-item { background: #252525; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .stat-val { display: block; color: #39FF14; font-weight: bold; font-size: 1.1em; }
        .stat-lab { font-size: 0.7em; color: #888; text-transform: uppercase; }

        /* Графік динаміки (CSS імітація) */
        .chart-box { margin: 15px 0; text-align: left; }
        .bar-container { background: #333; border-radius: 5px; height: 10px; margin: 5px 0; }
        .bar-fill { background: #39FF14; height: 100%; border-radius: 5px; box-shadow: 0 0 10px #39FF14; }

        /* Розклад та Календар */
        .schedule, .calendar { background: #222; padding: 12px; border-radius: 10px; margin-top: 15px; text-align: left; }
        .item { font-size: 0.9em; border-bottom: 1px solid #333; padding: 5px 0; display: flex; justify-content: space-between; }
        .item:last-child { border: none; }
        .date-tag { color: #39FF14; font-weight: bold; }

        .btn { background: #39FF14; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>G&M FOOTBALL HUB</h1>
        <div id="currentDate" style="color: #888; font-size: 0.9em;"></div>
    </div>

    <div class="card">
        <span style="position:absolute; top:10px; right:15px; color:#39FF14; font-weight:bold;">#1</span>
        <h2>ГЛІБ (11 років)</h2>
        <div class="stats-row">
            <div class="stat-item"><span class="stat-val">1.35 м</span><span class="stat-lab">Ріст</span></div>
            <div class="stat-item"><span class="stat-val">33 кг</span><span class="stat-lab">Вага</span></div>
            <div class="stat-item"><span class="stat-val">85%</span><span class="stat-lab">Форма</span></div>
        </div>

        <div class="chart-box">
            <span class="stat-lab">Прогрес навичок (XP):</span>
            <div class="bar-container"><div class="bar-fill" style="width: 75%;"></div></div>
        </div>

        <div class="schedule">
            <strong style="font-size: 0.8em; color: #39FF14;">📅 РОЗКЛАД ТРЕНУВАНЬ:</strong>
            <div class="item"><span>Пн, Ср, Пт</span> <span>17:00 - Футбол</span></div>
            <div class="item"><span>Сб</span> <span>10:00 - ОФП</span></div>
        </div>
    </div>

    <div class="card">
        <h2>МАРК (2 роки)</h2>
        <div class="stats-row">
            <div class="stat-item"><span class="stat-val">92 см</span><span class="stat-lab">Ріст</span></div>
            <div class="stat-item"><span class="stat-val">14.5 кг</span><span class="stat-lab">Вага</span></div>
            <div class="stat-item"><span class="stat-val">100%</span><span class="stat-lab">Енергія</span></div>
        </div>

        <div class="chart-box">
            <span class="stat-lab">Розвиток моторики:</span>
            <div class="bar-container"><div class="bar-fill" style="width: 40%;"></div></div>
        </div>
    </div>

    <div class="calendar">
        <h3 style="color: #39FF14; margin-top: 0;">⚽ КАЛЕНДАР ІГОР</h3>
        <div class="item"><span class="date-tag">15 БЕР</span> <span>Фінал Кубка (Гліб)</span></div>
        <div class="item"><span class="date-tag">22 БЕР</span> <span>Товариська гра</span></div>
    </div>

    <button class="btn" onclick="alert('Дані синхронізовано з хмарою!')">ОНОВИТИ ДАНІ СЕРВЕРУ</button>

    <script>
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('uk-UA', options);
    </script>
</body>
</html>
