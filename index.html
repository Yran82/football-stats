<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Elite</title>

    <style>
        :root { --main-green: #39FF14; --bg-dark: #0a0a0a; --card-bg: #161616; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 90px; }
        
        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 0.75em; text-align: center; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--main-green); font-weight: bold; }

        /* Контентные зоны */
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки */
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--main-green); position: relative; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid var(--danger); color: var(--danger); padding: 3px 8px; border-radius: 5px; font-size: 0.6em; cursor: pointer; width: auto; }
        
        /* Формы и Чат */
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; box-sizing: border-box; }

        .btn-main { background: var(--main-green); color: black; font-weight: bold; cursor: pointer; }
