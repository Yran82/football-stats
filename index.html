<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Global Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 15px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #39FF14; }
        h2 { color: #39FF14; margin: 0; text-transform: uppercase; font-size: 1.2em; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .stat-item { background: #252525; padding: 5px; border-radius: 8px; text-align: center; font-size: 0.8em; border: 1px solid #444; }
        .stat-val { display: block; color: #39FF14; font-weight: bold; }
        .xp-bar { background: #333; border-radius: 10px; height: 10px; margin: 8px 0; overflow: hidden; }
        .xp-fill { background: #39FF14; height: 100%; box-shadow: 0 0 8px #39FF14; }
        .form-section { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #39FF14; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn { background: #39FF14; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="color:#39FF14; text-align:center;">⚽ G&M GLOBAL HUB</h1>

    <div class="form-section">
        <h3 style="margin-top:0;">🌟 СТВОРИТИ КАРТКУ ГРАВЦЯ</h3>
        <input type="text" id="pName" placeholder="Ім'я дитини">
        <input type="number" id="pAge" placeholder="Вік">
        <input type="number" id="pHeight" placeholder="Ріст (см)">
        <button class="btn" onclick="saveToFirebase()">ОПУБЛІКУВАТИ У СВІТ</button>
    </div>

    <div id="playersFeed">
        <div class="card">
            <h2>ГЛІБ (11 років)</h2>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-val">135 см</span>Ріст</div>
                <div class="stat-item"><span class="stat-val">33 кг</span>Вага</div>
                <div class="stat-item"><span class="stat-val">XP 2500</span>Досвід</div>
            </div>
            <div class="xp-bar"><div class="xp-fill" style="width: 85%;"></div></div>
        </div>

        <div class="card">
            <h2>МАРК (2 роки)</h2>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-val">92 см</span>Ріст</div>
                <div class="stat-item"><span class="stat-val">14.5 кг</span>Вага</div>
                <div class="stat-item"><span class="stat-val">XP 500</span>Досвід</div>
            </div>
            <div class="xp-bar"><div class="xp-fill" style="width: 40%;"></div></div>
        </div>

        <hr style="border-color:#333">
        <h3 style="color:#888">ГРАВЦІ СПІЛЬНОТИ:</h3>
        <div id="dynamicFeed"></div>
    </div>

    <script>
        // Ініціалізація вашого Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyADqPVJXhMwre4O3GV6VL84b8y1VA7XApg",
            authDomain: "gm-football.firebaseapp.com",
            projectId: "gm-football",
            storageBucket: "gm-football.firebasestorage.app",
            messagingSenderId: "37289387027",
            appId: "1:37289387027:web:27083c91ee7f62ee81cbe6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Функція збереження
        async function saveToFirebase() {
            const name = document.getElementById('pName').value;
            const age = document.getElementById('pAge').value;
            const height = document.getElementById('pHeight').value;

            if(!name || !age) return alert("Вкажіть ім'я та вік!");

            await db.collection("players").add({
                name: name,
                age: age,
                height: height,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Картка опублікована!");
            location.reload();
        }

        // Завантаження карток інших людей
        db.collection("players").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('dynamicFeed');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="card" style="border-left-color: #555;">
                        <h2>${p.name.toUpperCase()} (${p.age} р.)</h2>
                        <div class="stats-grid">
                            <div class="stat-item"><span class="stat-val">${p.height} см</span>Ріст</div>
                            <div class="stat-item"><span class="stat-val">XP 100</span>Досвід</div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
