<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --green: #39FF14; --blue: #4285F4; --dark: #0a0a0a; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 80px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { flex: 1; padding: 15px; text-align: center; font-size: 0.7em; color: #888; cursor: pointer; }
        .nav-btn.active { color: var(--green); font-weight: bold; }
        .tab { display: none; padding: 15px; }
        .tab.active { display: block; }
        .card { background: #161616; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--green); position: relative; }
        .admin-only { display: none !important; }
        .del-btn { color: #ff4444; border: 1px solid #ff4444; background: none; padding: 3px 8px; border-radius: 5px; float: right; cursor: pointer; }
        canvas { max-width: 250px; margin: 0 auto; display: block; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #333; }
        .main-btn { background: var(--green); color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div style="text-align: right; padding: 10px;"><button onclick="adminLogin()" style="width:auto; padding:5px 10px; font-size:0.7em; background:#222; color:#555;">🔐 Admin</button></div>
    
    <div id="profile" class="tab active">
        <h1 style="color:var(--green); text-align:center;">G&M PRO CAREER</h1>
        <div class="card">
            <h3>ГЛІБ (11 років)</h3>
            <canvas id="chartGlib"></canvas>
            <p style="text-align:center; font-size:0.8em; color:#888;">Ріст: 135 см | Вага: 33 кг</p>
        </div>
        <div class="card" style="border-left-color: var(--blue);">
            <h3>МАРК (2 роки)</h3>
            <canvas id="chartMark"></canvas>
            <p style="text-align:center; font-size:0.8em; color:#888;">Ріст: 92 см | Вага: 14.5 кг</p>
        </div>
    </div>

    <div id="chat" class="tab">
        <h2 style="color:var(--green)">TEAM CHAT</h2>
        <div id="msg-box" style="height:300px; overflow-y:auto; background:#111; padding:10px; border-radius:10px;"></div>
        <input type="text" id="cTxt" placeholder="Повідомлення...">
        <input type="file" id="cFile" accept="image/*">
        <button class="main-btn" onclick="sendMsg()">ВІДПРАВИТИ</button>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('profile', this)">Профіль</div>
        <div class="nav-btn" onclick="showTab('chat', this)">Чат</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyADqPVJXhMwre4O3GV6VL84b8y1VA7XApg",
            authDomain: "gm-football.firebaseapp.com",
            projectId: "gm-football",
            storageBucket: "gm-football.firebasestorage.app",
            messagingSenderId: "37289387027",
            appId: "1:37289387027:web:27083c91ee7f62ee81cbe6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function adminLogin() {
            if(prompt("Пароль:") === "0608") {
                alert("Admin Mode Active!");
                const s = document.createElement('style');
                s.innerHTML = '.admin-only { display: block !important; }';
                document.head.appendChild(s);
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function mkChart(id, color, data) {
            new Chart(document.getElementById(id), {
                type: 'radar',
                data: {
                    labels: ['PAC', 'SHO', 'PAS', 'DRI', 'DEF', 'PHY'],
                    datasets: [{ data: data, backgroundColor: color+'33', borderColor: color, borderWidth: 2 }]
                },
                options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }
        window.onload = () => {
            mkChart('chartGlib', '#39FF14', [85, 80, 75, 90, 60, 70]);
            mkChart('chartMark', '#4285F4', [40, 30, 50, 60, 20, 40]);
        };

        async function sendMsg() {
            const t = document.getElementById('cTxt').value;
            const f = document.getElementById('cFile').files[0];
            let url = "";
            if(f) {
                const r = storage.ref('c/' + Date.now());
                await r.put(f);
                url = await r.getDownloadURL();
            }
            await db.collection("chat").add({ t, url, time: Date.now() });
            document.getElementById('cTxt').value = "";
        }

        db.collection("chat").orderBy("time", "asc").onSnapshot(s => {
            const b = document.getElementById('msg-box'); b.innerHTML = "";
            s.forEach(doc => {
                const m = doc.data();
                b.innerHTML += `<div class="card"><button class="del-btn admin-only" onclick="delItem('chat','${doc.id}')">×</button>
                    ${m.t || ""} ${m.url ? `<img src="${m.url}" style="max-width:100%; border-radius:10px; margin-top:5px;">` : ""}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        async function delItem(c, i) { if(confirm("Видалити?")) await db.collection(c).doc(i).delete(); }
    </script>
</body>
</html>
