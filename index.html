    <style>
        :root { --main-green: #39FF14; --bg-dark: #0a0a0a; --card-bg: #161616; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Навігація */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.8); }
        .nav-item { color: #888; font-size: 0.65em; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--main-green); transform: scale(1.1); font-weight: bold; }

        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Картки та елементи адміна */
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--main-green); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .admin-only { display: none !important; } /* Приховано за замовчуванням */
        .btn-del { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 10px; border-radius: 6px; font-size: 0.6em; cursor: pointer; }

        /* Графіки */
        .chart-container { width: 100%; max-width: 250px; margin: 15px auto; background: rgba(255,255,255,0.03); border-radius: 50%; padding: 10px; }

        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 0.9em; }
        input { background: #222; color: white; border: 1px solid #333; }
        .btn-main { background: var(--main-green); color: black; font-weight: bold; cursor: pointer; }
