<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&M Football Pro</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        .date-header { background: #1e1e1e; border-bottom: 3px solid #39FF14; padding: 15px; margin-bottom: 20px; border-radius: 0 0 15px 15px; }
        .date-text { font-size: 1.2em; font-weight: bold; color: #39FF14; text-transform: uppercase; }
        
        .tip-box { background: #252525; border: 1px dashed #39FF14; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1); }
        .tip-label { color: #888; font-size: 0.8em; letter-spacing: 1px; }
        #dailyTip { display: block; margin-top: 5px; font-weight: 500; font-style: italic; }

        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: left; }
        h2 { color: #39FF14; margin: 0 0 10px 0; font-size: 1.5em; }
        
        .btn { background: #39FF14; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1em; text-decoration: none; display: inline-block; text-align: center; }
        .btn-photo { background: #4285F4; color: white; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="date-header">
        <div id="fullDate" class="date-text"></div>
    </div>

    <div class="tip-box">
        <span class="tip-label">⚽ ПОРАДА ДНЯ</span>
        <span id="dailyTip">Завантаження поради...</span>
    </div>

    <div class="card">
        <h2>МАРК (11 років)</h2>
        <p>Ріст: 145 см | Голи: 12</p>
        <a href="ВСТАВТЕ_ПОСИЛАННЯ_НА_ALBUM_GOOGLE_PHOTOS" target="_blank" class="btn btn-photo">📸 ГАЛЕРЕЯ ТА ДОДАВАННЯ ФОТО</a>
    </div>

    <div class="card" style="border-color: #555;">
        <h2 style="color: #aaa;">ДОДАТИ СВОЮ ДИТИНУ</h2>
        <p style="font-size: 0.9em; color: #777;">Ця функція в розробці. Незабаром ви зможете створювати власні картки!</p>
        <button class="btn" style="background: #444; color: #888;" disabled>СТВОРЮЄТЬСЯ</button>
    </div>

    <script>
        // Календар
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('fullDate').innerText = new Date().toLocaleDateString('uk-UA', options);

        // Масив порад
        const tips = [
            "Пий воду кожні 20 хвилин під час тренування.",
            "Сон 9+ годин — найкращий спосіб рости швидше.",
            "Тренуй слабку ногу 15 хвилин щодня.",
            "Горіхи та фрукти — найкращий перекус перед матчем.",
            "Завжди роби розтяжку після гри, щоб уникнути травм.",
            "Аналізуй гру Mbappé, щоб навчитися швидкості!"
        ];
        
        // Рандомний вибір поради
        document.getElementById('dailyTip').innerText = tips[Math.floor(Math.random() * tips.length)];
    </script>
</body>
</html>
