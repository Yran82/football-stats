<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pro Player Card - Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #333; margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .name { font-size: 26px; font-weight: bold; color: #93d501; text-transform: uppercase; }
        .age { color: #888; font-size: 14px; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #2a2a2a; padding: 10px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #fff; }
        canvas { max-width: 100%; height: auto !important; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="name" id="p_name">Завантаження...</div>
        <div class="age" id="p_age">0 років</div>
    </div>
    
    <canvas id="skillsChart"></canvas>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">📏 Ріст</div>
            <div class="stat-value"><span id="p_height">0</span> см</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">⚖️ Вага</div>
            <div class="stat-value"><span id="p_weight">15</span> кг</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="stat-label" style="text-align:center; margin-bottom:15px; color: #93d501;">📈 Динаміка розвитку</div>
    <canvas id="historyChart"></canvas>
</div>

    const params = new URLSearchParams(window.location.search);
    const pName = params.get('name') || "Player";
    
    document.getElementById('p_name').innerText = pName.toUpperCase();
    document.getElementById('p_age').innerText = (pName.toLowerCase() === 'glib') ? '11 років' : '2 роки';
    document.getElementById('p_height').innerText = params.get('h') || "0";
    document.getElementById('p_weight').innerText = params.get('w') || "0";

        parseInt(params.get('p')) || 50,
        parseInt(params.get('v')) || 50,
        parseInt(params.get('f')) || 50

                borderWidth: 2,
                pointRadius: 2
            }]
